name: Public Artifact Sanitization

on:
  pull_request:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  public-artifact-sanitization:
    name: public-artifact-sanitization
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Self-test sanitizer
        run: python3 scripts/ci/check-public-artifact-sanitization.py --self-test

      - name: Scan tracked public artifacts
        run: python3 scripts/ci/check-public-artifact-sanitization.py
