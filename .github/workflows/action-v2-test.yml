name: Action v2 Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'assay-action/**'
      - '.github/workflows/action-v2-test.yml'

permissions:
  contents: read

jobs:
  build-assay-cli:
    name: Build Assay CLI Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build Assay CLI once
        run: cargo build --release -p assay-cli

      - name: Package CLI artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/action-v2-cli
          cp target/release/assay dist/action-v2-cli/assay
          chmod 0755 dist/action-v2-cli/assay
          dist/action-v2-cli/assay --version | tee dist/action-v2-cli/assay.version
          (
            cd dist/action-v2-cli
            sha256sum assay | tee assay.sha256
            tar -czf ../assay-action-v2-cli-linux-x64.tar.gz assay assay.sha256 assay.version
          )
          echo "Packaged artifact:"
          sha256sum dist/assay-action-v2-cli-linux-x64.tar.gz

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: assay-action-v2-cli-linux-x64-${{ github.sha }}
          path: dist/assay-action-v2-cli-linux-x64.tar.gz
          if-no-files-found: error

  test-no-bundles:
    name: Test (no bundles - soft exit)
    runs-on: ubuntu-latest
    needs: build-assay-cli
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: assay-action-v2-cli-linux-x64-${{ github.sha }}
          path: dist

      - name: Install CLI artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release
          tar -xzf dist/assay-action-v2-cli-linux-x64.tar.gz -C target/release
          (
            cd target/release
            sha256sum -c assay.sha256
            ./assay --version
          )

      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      - name: Test action with no bundles
        uses: ./assay-action

  test-with-bundle:
    name: Test (with valid bundle)
    runs-on: ubuntu-latest
    needs: build-assay-cli
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: assay-action-v2-cli-linux-x64-${{ github.sha }}
          path: dist

      - name: Install CLI artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release
          tar -xzf dist/assay-action-v2-cli-linux-x64.tar.gz -C target/release
          (
            cd target/release
            sha256sum -c assay.sha256
            ./assay --version
          )

      - name: Setup evidence directory with fixture
        run: |
          mkdir -p .assay/evidence
          cp tests/fixtures/evidence/test-bundle.tar.gz .assay/evidence/

      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      - name: Test action with bundle
        id: assay
        uses: ./assay-action
        with:
          bundles: '.assay/evidence/*.tar.gz'
          fail_on: none

      - name: Check outputs
        env:
          ASSAY_VERIFIED: ${{ steps.assay.outputs.verified }}
          ASSAY_FINDINGS_ERROR: ${{ steps.assay.outputs.findings_error }}
          ASSAY_FINDINGS_WARN: ${{ steps.assay.outputs.findings_warn }}
        run: |
          echo "Verified: ${ASSAY_VERIFIED}"
          echo "Errors: ${ASSAY_FINDINGS_ERROR}"
          echo "Warnings: ${ASSAY_FINDINGS_WARN}"

          # Verify outputs are set correctly
          if [ "${ASSAY_VERIFIED}" != "true" ]; then
            echo "ERROR: Expected verified=true"
            exit 1
          fi

      - name: Verify reports created
        env:
          ASSAY_REPORTS_DIR: ${{ steps.assay.outputs.reports_dir }}
        run: |
          echo "Reports dir: ${ASSAY_REPORTS_DIR}"
          echo "Checking .assay-reports/ directory..."
          ls -la .assay-reports/ || echo "Directory not found"

          # Check SARIF file exists
          if [ -f ".assay-reports/lint.sarif" ]; then
            echo "SARIF file created"
            head -20 .assay-reports/lint.sarif
          else
            echo "Note: SARIF file not created (lint may not have output)"
          fi

      # Artifact upload is handled by the action itself (tar + upload)

  test-with-pack:
    name: Test (with compliance pack)
    runs-on: ubuntu-latest
    needs: build-assay-cli
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: assay-action-v2-cli-linux-x64-${{ github.sha }}
          path: dist

      - name: Install CLI artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release
          tar -xzf dist/assay-action-v2-cli-linux-x64.tar.gz -C target/release
          (
            cd target/release
            sha256sum -c assay.sha256
            ./assay --version
          )

      - name: Setup evidence directory with fixture
        run: |
          mkdir -p .assay/evidence
          cp tests/fixtures/evidence/test-bundle.tar.gz .assay/evidence/

      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      - name: Test action with compliance pack
        id: assay_pack
        uses: ./assay-action
        with:
          bundles: '.assay/evidence/*.tar.gz'
          fail_on: none
          pack: eu-ai-act-baseline

      - name: Validate pack outputs
        env:
          PACK_STATUS: ${{ steps.assay_pack.outputs.pack_status }}
          RESOLVED_PACK_REFS: ${{ steps.assay_pack.outputs.resolved_pack_refs }}
          PACK_SCORE: ${{ steps.assay_pack.outputs.pack_score }}
        run: |
          echo "Pack status: ${PACK_STATUS}"
          echo "Resolved packs: ${RESOLVED_PACK_REFS}"
          echo "Pack score: ${PACK_SCORE}"

          if [ "${PACK_STATUS}" != "success" ]; then
            echo "ERROR: expected pack_status=success"
            exit 1
          fi

          if [ -z "${RESOLVED_PACK_REFS}" ]; then
            echo "ERROR: expected resolved_pack_refs to be set"
            exit 1
          fi

  test-missing-pack-fails-cleanly:
    name: Test (missing compliance pack failure mode)
    runs-on: ubuntu-latest
    needs: build-assay-cli
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: assay-action-v2-cli-linux-x64-${{ github.sha }}
          path: dist

      - name: Install CLI artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release
          tar -xzf dist/assay-action-v2-cli-linux-x64.tar.gz -C target/release
          (
            cd target/release
            sha256sum -c assay.sha256
            ./assay --version
          )

      - name: Setup evidence directory with fixture
        run: |
          mkdir -p .assay/evidence
          cp tests/fixtures/evidence/test-bundle.tar.gz .assay/evidence/

      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      - name: Run action with missing pack (expected failure)
        id: assay_missing_pack
        continue-on-error: true
        uses: ./assay-action
        with:
          bundles: '.assay/evidence/*.tar.gz'
          fail_on: none
          pack: definitely-not-a-real-pack

      - name: Validate failure mode outputs
        env:
          STEP_OUTCOME: ${{ steps.assay_missing_pack.outcome }}
          PACK_STATUS: ${{ steps.assay_missing_pack.outputs.pack_status }}
          PACK_ERROR_KIND: ${{ steps.assay_missing_pack.outputs.pack_error_kind }}
        run: |
          echo "Step outcome: ${STEP_OUTCOME}"
          echo "Pack status: ${PACK_STATUS}"
          echo "Pack error kind: ${PACK_ERROR_KIND}"

          if [ "${STEP_OUTCOME}" != "failure" ]; then
            echo "ERROR: expected action step to fail on missing pack"
            exit 1
          fi

          if [ "${PACK_STATUS}" != "missing_pack" ]; then
            echo "ERROR: expected pack_status=missing_pack"
            exit 1
          fi

          if [ "${PACK_ERROR_KIND}" != "missing_pack" ]; then
            echo "ERROR: expected pack_error_kind=missing_pack"
            exit 1
          fi

  test-invalid-pack-fails-cleanly:
    name: Test (invalid compliance pack failure mode)
    runs-on: ubuntu-latest
    needs: build-assay-cli
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: assay-action-v2-cli-linux-x64-${{ github.sha }}
          path: dist

      - name: Install CLI artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release
          tar -xzf dist/assay-action-v2-cli-linux-x64.tar.gz -C target/release
          (
            cd target/release
            sha256sum -c assay.sha256
            ./assay --version
          )

      - name: Setup evidence directory with fixture
        run: |
          mkdir -p .assay/evidence
          cp tests/fixtures/evidence/test-bundle.tar.gz .assay/evidence/

      - name: Create invalid pack file
        run: |
          cat > invalid-pack.yaml <<'EOF'
          name: broken-pack
          kind: compliance
          version: "1.0.0"
          rules:
            - id: BAD-001
              message: "missing required fields on purpose"
          EOF

      - name: Add CLI to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      - name: Run action with invalid pack (expected failure)
        id: assay_invalid_pack
        continue-on-error: true
        uses: ./assay-action
        with:
          bundles: '.assay/evidence/*.tar.gz'
          fail_on: none
          pack: ./invalid-pack.yaml

      - name: Validate invalid-pack failure mode outputs
        env:
          STEP_OUTCOME: ${{ steps.assay_invalid_pack.outcome }}
          PACK_STATUS: ${{ steps.assay_invalid_pack.outputs.pack_status }}
          PACK_ERROR_KIND: ${{ steps.assay_invalid_pack.outputs.pack_error_kind }}
        run: |
          echo "Step outcome: ${STEP_OUTCOME}"
          echo "Pack status: ${PACK_STATUS}"
          echo "Pack error kind: ${PACK_ERROR_KIND}"

          if [ "${STEP_OUTCOME}" != "failure" ]; then
            echo "ERROR: expected action step to fail on invalid pack"
            exit 1
          fi

          if [ "${PACK_STATUS}" != "invalid_pack" ]; then
            echo "ERROR: expected pack_status=invalid_pack"
            exit 1
          fi

          if [ "${PACK_ERROR_KIND}" != "invalid_pack" ]; then
            echo "ERROR: expected pack_error_kind=invalid_pack"
            exit 1
          fi
