name: Runner Spike Delegated

on:
  workflow_dispatch:
    inputs:
      gates:
        description: "Delegated Phase 1 gate set to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - kernel-only
          - kernel-policy
          - openai-agents-kernel-policy
      build_ebpf:
        description: "Build target/assay-ebpf.o before running the gates"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: runner-spike-delegated-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-delegated-runner:
    name: Prepare delegated runner
    runs-on: [self-hosted, linux, assay-bpf-runner]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Pre-clean delegated runner caches
        shell: bash
        run: |
          set +e
          sudo pkill -x assay 2>/dev/null || true
          sudo chattr -R -i "$GITHUB_WORKSPACE/.assay-test" 2>/dev/null || true
          sudo rm -rf "$GITHUB_WORKSPACE/target" "$GITHUB_WORKSPACE/.assay-test" 2>/dev/null || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec sudo rm -rf {} + 2>/dev/null || true
          sudo rm -rf /tmp/assay-runner-* /dev/shm/assay-runner-* /tmp/assay-test 2>/dev/null || true
          if find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -print -quit | grep -q .; then
            echo "ERROR: workspace not empty after delegated pre-clean"
            find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 2 -ls | sed -n '1,200p'
            exit 1
          fi
          # Destructive on shared runners: this lane assumes assay-bpf-runner is
          # dedicated to eBPF validation and may wipe Docker plus Actions caches.
          sudo docker system prune -af --volumes 2>/dev/null || true
          sudo chattr -R -i /opt/actions-runner/_work/_actions 2>/dev/null || true
          sudo rm -rf /opt/actions-runner/_work/_actions 2>/dev/null || true
          sudo mkdir -p /opt/actions-runner/_work/_actions 2>/dev/null || true
          sudo chown -R "$(id -u):$(id -g)" /opt/actions-runner/_work/_actions 2>/dev/null || true
          if [ -n "${RUNNER_WORKDIR:-}" ]; then
            sudo chattr -R -i "${RUNNER_WORKDIR}/_actions" 2>/dev/null || true
            sudo rm -rf "${RUNNER_WORKDIR}/_actions" 2>/dev/null || true
            sudo mkdir -p "${RUNNER_WORKDIR}/_actions" 2>/dev/null || true
            sudo chown -R "$(id -u):$(id -g)" "${RUNNER_WORKDIR}/_actions" 2>/dev/null || true
          fi
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" 2>/dev/null || true

  phase1-delegated-gates:
    name: Phase 1 delegated gates (${{ inputs.gates }})
    needs: prepare-delegated-runner
    runs-on: [self-hosted, linux, assay-bpf-runner]
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      CARGO_INCREMENTAL: 0
      ASSAY_RUNNER_DELEGATED_PROOF_ROOT: /tmp/assay-runner-proof-${{ github.run_id }}
      ASSAY_RUNNER_DELEGATED_PROOF_UPLOAD: ${{ github.workspace }}/assay-runner-proof-upload

    steps:
      - name: Prepend Rust to PATH
        shell: bash
        run: |
          echo "/home/github-runner/.cargo/bin" >> "$GITHUB_PATH"
          echo "/opt/rust/bin" >> "$GITHUB_PATH"

      - name: Pre-clean delegated workspace
        shell: bash
        run: |
          set +e
          sudo pkill -x assay 2>/dev/null || true
          sudo chattr -R -i "$GITHUB_WORKSPACE/.assay-test" 2>/dev/null || true
          sudo rm -rf "$GITHUB_WORKSPACE/target" "$GITHUB_WORKSPACE/.assay-test" 2>/dev/null || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec sudo rm -rf {} + 2>/dev/null || true
          sudo rm -rf /tmp/assay-runner-* /dev/shm/assay-runner-* /tmp/assay-test 2>/dev/null || true
          if find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -print -quit | grep -q .; then
            echo "ERROR: workspace not empty after delegated pre-clean"
            find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 2 -ls | sed -n '1,200p'
            exit 1
          fi
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" 2>/dev/null || true

      # The separate prepare job removes root-owned _actions cache state before
      # this job's actions are loaded. Do not delete _actions in this job:
      # GitHub downloads action repositories during "Set up job", before steps.
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Preflight delegated host
        shell: bash
        run: |
          set -euo pipefail
          for bin in cargo git node npm python3 rustc sudo tar; do
            command -v "$bin" >/dev/null 2>&1 || {
              echo "ERROR: required command not found on delegated runner: $bin" >&2
              exit 1
            }
          done
          node -e 'const major = Number(process.versions.node.split(".")[0]); if (major < 22) process.exit(1)' || {
            echo "ERROR: delegated runner must provide Node.js 22 or newer" >&2
            node --version >&2 || true
            exit 1
          }
          if [ ! -f /sys/fs/cgroup/cgroup.controllers ]; then
            echo "ERROR: delegated runner must expose cgroup v2 at /sys/fs/cgroup" >&2
            exit 1
          fi
          echo "Delegated runner preflight passed"
          {
            echo "- kernel: $(uname -r)"
            echo "- node: $(node --version)"
            echo "- rustc: $(rustc --version)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install OpenAI Agents fixture deps
        working-directory: runner-fixtures/openai-agents
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Gemini google-genai fixture deps
        working-directory: runner-fixtures/gemini-google-genai
        shell: bash
        run: |
          set -euo pipefail
          # Fixture-local target directory so the Gemini runtime is isolated
          # from system Python packages without requiring python3-venv on the
          # delegated host. Offline scope per #1307: install may use network
          # here during workflow setup; fixture execution itself is
          # cassette-replay only.
          if ! python3 -m pip --version >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y python3-pip
          fi
          rm -rf .python-deps
          python3 -m pip install --require-hashes --target .python-deps -r requirements.txt

      - name: Build assay CLI
        shell: bash
        run: |
          set -euo pipefail
          # `runner` is an explicit feature in 3.11.1+: with --no-default-features
          # we must opt back in so `assay runner-spike` is compiled for the
          # delegated gates. See CHANGELOG entry for v3.11.1.
          cargo build -p assay-cli --no-default-features --features runner

      - name: Build eBPF artifact
        if: inputs.build_ebpf
        shell: bash
        run: |
          set -euo pipefail
          if command -v docker >/dev/null 2>&1; then
            cargo xtask build-image
            cargo xtask build-ebpf --docker
          else
            cargo xtask build-ebpf
          fi
          test -f target/assay-ebpf.o

      - name: Verify eBPF artifact
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f target/assay-ebpf.o ]; then
            echo "ERROR: target/assay-ebpf.o is required for delegated runner-spike gates." >&2
            echo "Run with build_ebpf=true or prepare the artifact before dispatch." >&2
            exit 1
          fi
          ls -lh target/assay-ebpf.o target/debug/assay

      - name: Run delegated Phase 1 gates
        shell: bash
        env:
          GATES: ${{ inputs.gates }}
        run: |
          set -euo pipefail
          assay_bin="$PWD/target/debug/assay"
          ebpf_path="$PWD/target/assay-ebpf.o"
          rm -rf "$ASSAY_RUNNER_DELEGATED_PROOF_ROOT" "$ASSAY_RUNNER_DELEGATED_PROOF_UPLOAD"
          mkdir -p "$ASSAY_RUNNER_DELEGATED_PROOF_ROOT/gates"

          run_gate() {
            local key="$1"
            local label="$2"
            local script="$3"
            local gate_dir="$ASSAY_RUNNER_DELEGATED_PROOF_ROOT/gates/$key"
            echo "=== runner-spike delegated gate: ${label} ==="
            rm -rf "$gate_dir"
            mkdir -p "$gate_dir"
            set +e
            sudo -E env \
              "PATH=$PATH" \
              "ASSAY_BIN=$assay_bin" \
              "ASSAY_EBPF_PATH=$ebpf_path" \
              "ASSAY_RUNNER_DELEGATED_PROOF_GATE_DIR=$gate_dir" \
              bash "$script" 2>&1 | tee "$gate_dir/gate.log"
            local status="${PIPESTATUS[0]}"
            sudo chown -R "$(id -u):$(id -g)" "$gate_dir" 2>/dev/null || true
            set -e
            if [ "$status" -eq 0 ]; then
              echo "passed" > "$gate_dir/status.txt"
            else
              echo "failed" > "$gate_dir/status.txt"
              return "$status"
            fi
            echo "- ${label}: passed" >> "$GITHUB_STEP_SUMMARY"
          }

          case "$GATES" in
            all)
              run_gate "kernel-only" "kernel-only three-run determinism" \
                "$PWD/scripts/ci/runner-spike-kernel-only-three-run-determinism.sh"
              run_gate "kernel-policy" "kernel+policy three-run determinism" \
                "$PWD/scripts/ci/runner-spike-kernel-policy-three-run-determinism.sh"
              run_gate "openai-agents-kernel-policy" "OpenAI Agents kernel+policy+SDK three-run determinism" \
                "$PWD/scripts/ci/runner-spike-openai-agents-kernel-policy-three-run-determinism.sh"
              run_gate "openai-agents-hidden-write" "OpenAI Agents hidden_write semantic-gap determinism" \
                "$PWD/scripts/ci/runner-spike-openai-agents-kernel-policy-hidden-write-three-run-determinism.sh"
              # Gemini Python google-genai second-runtime gate. Runs under
              # the existing `all` umbrella per #1307 non-goal: do not
              # introduce a new narrower delegated gate name. If a narrower
              # gate is later coordinated, this run_gate call moves into
              # its own case branch and a new enum value is added to
              # inputs.gates.options as a separate decision PR.
              run_gate "gemini-google-genai-kernel-policy" "Gemini google-genai kernel+policy+SDK three-run determinism" \
                "$PWD/scripts/ci/runner-spike-gemini-google-genai-three-run-determinism.sh"
              ;;
            kernel-only)
              run_gate "kernel-only" "kernel-only three-run determinism" \
                "$PWD/scripts/ci/runner-spike-kernel-only-three-run-determinism.sh"
              ;;
            kernel-policy)
              run_gate "kernel-policy" "kernel+policy three-run determinism" \
                "$PWD/scripts/ci/runner-spike-kernel-policy-three-run-determinism.sh"
              ;;
            openai-agents-kernel-policy)
              run_gate "openai-agents-kernel-policy" "OpenAI Agents kernel+policy+SDK three-run determinism" \
                "$PWD/scripts/ci/runner-spike-openai-agents-kernel-policy-three-run-determinism.sh"
              ;;
            *)
              echo "ERROR: unsupported delegated gate selection: $GATES" >&2
              exit 1
              ;;
          esac

      - name: Build delegated proof pack
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          workflow_sha="${GITHUB_WORKFLOW_SHA:-$GITHUB_SHA}"
          python3 scripts/ci/assay_runner_delegated_proof_pack.py \
            --proof-root "$ASSAY_RUNNER_DELEGATED_PROOF_ROOT" \
            --output-dir "$ASSAY_RUNNER_DELEGATED_PROOF_UPLOAD" \
            --gates "${{ inputs.gates }}" \
            --build-ebpf "${{ inputs.build_ebpf }}" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --run-url "$run_url" \
            --ref "$GITHUB_REF" \
            --head-sha "$GITHUB_SHA" \
            --workflow-sha "$workflow_sha" \
            --workflow-name "$GITHUB_WORKFLOW" \
            --retention-days 365
          {
            echo "### Delegated proof pack"
            echo "- artifact: assay-runner-delegated-proof-pack-${GITHUB_RUN_ID}"
            echo "- manifest: assay-runner-proof-upload/manifest.json"
            echo "- retention-days: 365"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload delegated proof pack
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assay-runner-delegated-proof-pack-${{ github.run_id }}
          path: assay-runner-proof-upload
          if-no-files-found: warn
          retention-days: 365

      - name: Cleanup delegated runner
        if: always()
        shell: bash
        run: |
          set +e
          sudo pkill -x assay 2>/dev/null || true
          sudo rm -rf /tmp/assay-runner-* /dev/shm/assay-runner-* /tmp/assay-test 2>/dev/null || true
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" 2>/dev/null || true
