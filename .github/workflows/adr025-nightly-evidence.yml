name: ADR-025 Nightly Evidence (informational)

on:
  schedule:
    # Nightly at 02:17 UTC. The old split lanes ran at 02:17/02:29/02:41/02:53.
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of recent soak runs to summarize"
        required: false
        default: "20"

concurrency:
  group: adr025-nightly-evidence
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  soak:
    name: sim soak (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build (assay-cli)
        run: cargo build -p assay-cli

      - name: Run soak (informational)
        env:
          # Gate mode placeholder (kept off for ADR-025 informational soak).
          ASSAY_SOAK_GATE: "off"
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cargo run -p assay-cli -- sim soak \
            --target nightly \
            --report artifacts/soak_report.json \
            --seed 1 \
            --iterations 50 \
            --time-budget 60

      - name: Upload soak report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adr025-soak-report
          path: artifacts/soak_report.json
          if-no-files-found: warn
          retention-days: 14

  readiness:
    name: aggregate soak readiness (informational)
    needs: soak
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      actions: read # gh run list/download recent soak artifacts
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Prepare dirs
        run: |
          set -euo pipefail
          mkdir -p input/reports/current input/meta artifacts

      - name: Download current soak artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: adr025-soak-report
          path: input/reports/current

      - name: Download recent soak history
        env:
          GH_TOKEN: ${{ github.token }}
          RUNS: ${{ inputs.runs || '20' }}
          SOAK_RESULT: ${{ needs.soak.result }}
        run: |
          set -euo pipefail
          gh run list \
            --workflow "adr025-nightly-evidence.yml" \
            --branch main \
            --status success \
            --limit "${RUNS}" \
            --json databaseId,conclusion,createdAt \
            > input/meta/evidence_runs.json

          # Transitional backfill: the consolidated workflow replaces the old
          # soak lane, but release readiness still expects a multi-run window.
          # Pull old soak artifacts until enough consolidated runs exist.
          gh run list \
            --workflow "adr025-nightly-soak.yml" \
            --branch main \
            --status success \
            --limit "${RUNS}" \
            --json databaseId,conclusion,createdAt \
            > input/meta/legacy_soak_runs.json || echo "[]" > input/meta/legacy_soak_runs.json

          python3 - "$RUNS" "$SOAK_RESULT" > input/meta/runs.json <<'PY'
          import json
          import sys

          runs_limit = int(sys.argv[1])
          current_result = sys.argv[2] or "unknown"


          def load(path):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      data = json.load(f)
              except Exception:
                  return []
              return data if isinstance(data, list) else []


          seen = set()
          combined = [
              {
                  "databaseId": None,
                  "conclusion": "success" if current_result == "success" else current_result,
                  "createdAt": None,
              }
          ]

          for source in ("input/meta/evidence_runs.json", "input/meta/legacy_soak_runs.json"):
              for run in load(source):
                  rid = run.get("databaseId")
                  if rid is None or rid in seen:
                      continue
                  seen.add(rid)
                  combined.append(run)
                  if len(combined) >= runs_limit:
                      break
              if len(combined) >= runs_limit:
                  break

          print(json.dumps(combined, sort_keys=True))
          PY

          python3 - input/meta/runs.json <<'PY' | while read -r rid; do
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as f:
              runs = json.load(f)

          for run in runs:
              rid = run.get("databaseId")
              if rid is not None:
                  print(rid)
          PY
            mkdir -p "input/reports/${rid}"
            gh run download "$rid" -n "adr025-soak-report" -D "input/reports/${rid}" || true
          done

      - name: Build readiness report
        run: |
          set -euo pipefail
          bash scripts/ci/adr025-soak-readiness-report.sh input artifacts

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adr025-nightly-readiness
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 14

  closure:
    name: closure evaluate (informational)
    needs:
      - soak
      - readiness
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Prepare inputs
        run: |
          set -euo pipefail
          mkdir -p inputs artifacts

      - name: Download current soak artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: adr025-soak-report
          path: inputs/soak

      - name: Download current readiness artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: adr025-nightly-readiness
          path: inputs/readiness

      - name: Prepare closure inputs
        run: |
          set -euo pipefail
          cp inputs/soak/soak_report.json inputs/soak_report.json
          if [[ -f inputs/readiness/nightly_readiness.json ]]; then
            cp inputs/readiness/nightly_readiness.json inputs/nightly_readiness.json
          else
            candidate="$(find inputs/readiness -name nightly_readiness.json -print -quit)"
            if [[ -n "${candidate}" ]]; then
              cp "${candidate}" inputs/nightly_readiness.json
            fi
          fi
          test -f inputs/nightly_readiness.json
          cp scripts/ci/fixtures/adr025-i2/manifest_good.json inputs/manifest.json

      - name: Evaluate closure
        run: |
          set -euo pipefail
          bash scripts/ci/adr025-closure-evaluate.sh \
            --soak inputs/soak_report.json \
            --readiness inputs/nightly_readiness.json \
            --manifest inputs/manifest.json \
            --policy schemas/closure_policy_v1.json \
            --out-json artifacts/closure_report_v1.json \
            --out-md artifacts/closure_report_v1.md

      - name: Upload closure artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adr025-closure-report
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 14

  otel_bridge:
    name: otel bridge (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Prepare artifacts dir
        run: |
          set -euo pipefail
          mkdir -p artifacts

      - name: Generate OTel bridge report (fixture)
        run: |
          set -euo pipefail
          bash scripts/ci/adr025-otel-bridge.sh \
            --in scripts/ci/fixtures/adr025-i3/otel_input_minimal.json \
            --out-json artifacts/otel_bridge_report_v1.json \
            --out-md artifacts/otel_bridge_report_v1.md

      - name: Upload OTel bridge artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adr025-otel-bridge-report
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 14
