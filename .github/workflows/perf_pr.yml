# PR: vergelijk altijd met main-baseline via start-point + clone-thresholds.
# Gebruik expliciet `main` als start-point zodat feature/base branches die in
# Bencher gearchiveerd zijn geen 404 "Head Version not found" veroorzaken.
# Alleen same-repo PRs (secrets niet beschikbaar op forks).
# Vereist: BENCHER_PROJECT, BENCHER_API_TOKEN.
#
# Thresholds (jan 2026):
# - Cloned from main baseline (--start-point-clone-thresholds)
# - NO --err: alerts are warnings only (runner variance is too high)
name: Perf (PR compare)

on:
  pull_request:
    types: [opened, reopened, edited, synchronize, closed]

permissions:
  pull-requests: write
  contents: read

jobs:
  detect-benchmark-relevance:
    name: Detect benchmark-relevant changes
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect benchmark-relevant paths
        id: detect
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git diff --name-only "${BASE_SHA}...${HEAD_SHA}" > changed_files.txt
          if grep -Eq '^(Cargo\.toml|Cargo\.lock|crates/|benches/|\.github/workflows/perf_pr\.yml)' changed_files.txt; then
            relevant=true
          else
            relevant=false
          fi
          echo "relevant=${relevant}" >> "$GITHUB_OUTPUT"
          {
            echo "## Perf PR relevance"
            echo "- relevant: ${relevant}"
            echo "- changed files:"
            sed 's/^/  - /' changed_files.txt
          } >> "$GITHUB_STEP_SUMMARY"

  benches:
    name: Criterion compare (PR vs main)
    needs: detect-benchmark-relevance
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.action != 'closed' && needs.detect-benchmark-relevance.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # Bencher 404 (e.g. main baseline not found) should not block PR merge
    continue-on-error: true
    env:
      QUICK: "1"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Swatinem/rust-cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Linux deps
        shell: bash
        run: |
          set -euo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends clang libsqlite3-dev || {
            sudo DEBIAN_FRONTEND=noninteractive apt-get update -y -o Acquire::Retries=10 -o Acquire::http::Timeout=60 -o Acquire::https::Timeout=60
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends clang libsqlite3-dev
          }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - uses: bencherdev/bencher@0f8f620172ccd6225d40a7590598eb7b41718af8 # v0.6.2
      # stdin/pipe mode: cargo bench output piped to bencher run (no command after --)
      - name: Criterion (store_write_heavy)
        env:
          BENCHER_PROJECT: ${{ secrets.BENCHER_PROJECT }}
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$BENCHER_PROJECT" ] || [ -z "$BENCHER_API_TOKEN" ]; then echo "Bencher not configured, skipping."; exit 0; fi
          cargo bench -p assay-core --bench store_write_heavy 2>&1 \
            | grep -v "Gnuplot not found" \
            | bencher run \
                --project "$BENCHER_PROJECT" \
                --token "$BENCHER_API_TOKEN" \
                --branch "$GITHUB_HEAD_REF" \
                --start-point main \
                --start-point-clone-thresholds \
                --start-point-reset \
                --testbed ubuntu-latest \
                --adapter rust_criterion \
                --ci-id store_write_heavy \
                --github-actions "$GITHUB_TOKEN"
          test -d target/criterion
          find target/criterion -name estimates.json -print -quit | grep -q .

      - name: Criterion (suite_run_worstcase)
        env:
          BENCHER_PROJECT: ${{ secrets.BENCHER_PROJECT }}
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$BENCHER_PROJECT" ] || [ -z "$BENCHER_API_TOKEN" ]; then echo "Bencher not configured, skipping."; exit 0; fi
          cargo bench -p assay-cli --bench suite_run_worstcase 2>&1 \
            | grep -v "Gnuplot not found" \
            | bencher run \
                --project "$BENCHER_PROJECT" \
                --token "$BENCHER_API_TOKEN" \
                --branch "$GITHUB_HEAD_REF" \
                --start-point main \
                --start-point-clone-thresholds \
                --start-point-reset \
                --testbed ubuntu-latest \
                --adapter rust_criterion \
                --ci-id suite_run_worstcase \
                --github-actions "$GITHUB_TOKEN"
          test -d target/criterion
          find target/criterion -name estimates.json -print -quit | grep -q .

  archive_pr_branch:
    name: Archive closed PR branch with Bencher
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: bencherdev/bencher@0f8f620172ccd6225d40a7590598eb7b41718af8 # v0.6.2
      - name: Archive closed PR branch with Bencher
        env:
          BENCHER_PROJECT: ${{ secrets.BENCHER_PROJECT }}
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
        run: |
          if [ -z "$BENCHER_PROJECT" ] || [ -z "$BENCHER_API_TOKEN" ]; then
            echo "Bencher not configured, skipping."
            exit 0
          fi
          # Archive may fail if PR was closed before any benchmarks ran (branch doesn't exist in Bencher)
          # This is expected and non-fatal
          if ! bencher archive \
            --project "$BENCHER_PROJECT" \
            --token "$BENCHER_API_TOKEN" \
            --branch "$GITHUB_HEAD_REF" 2>&1; then
            echo "::notice::Branch '$GITHUB_HEAD_REF' not found in Bencher (no benchmarks ran). Skipping archive."
          fi
