version: "2.0"
name: "fragmented-ipi-ablation-sequence-only"

tools:
  deny:
    - "delete_*"
    - "move_*"

schemas:
  read_document:
    type: object
    additionalProperties: false
    properties:
      path:
        type: string
        pattern: '^(?:(?:invoice_with_canary|doc_a|doc_b|public_article)\.txt|wrap_bypass/(?:attack_doc_part1|attack_doc_part2|legit_doc)\.txt)$'
        minLength: 1
        maxLength: 128
    required: ["path"]

  web_search:
    type: object
    additionalProperties: false
    properties:
      query:
        type: string
        minLength: 1
        maxLength: 240
    required: ["query"]

enforcement:
  unconstrained_tools: warn
